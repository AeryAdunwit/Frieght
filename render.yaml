services:
  - type: web
    name: frieght-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: TRACKING_SHEET_ID
        sync: false
      - key: TRACKING_CSV_PATH
        sync: false
