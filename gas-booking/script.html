<script>
let carliste = localStorage.getItem('carlists');
let carlist = carliste ? JSON.parse(carliste) : [];

$(document).ready(function () {
    sessionStorage.removeItem('selectedDate');
    showhidepage('.home')
    let carEvents = carlist.map(function (row) {
        let localDate = moment.utc(row[0]).local().format();
        return {
            start: localDate,
            name: row[1],
            carType: row[2],
            amount: row[3],
            location: row[4],
            title: row[1]
        };
    });

    $('#calendar').fullCalendar({
        height: 'auto',
        header: {
            left: 'prev,next today',
            center: 'title',
            right: 'month,agendaWeek,agendaDay'
        },
        navLinks: true,
        editable: true,
        eventLimit: true,
        displayEventTime: false,
        events: carEvents,
        eventRender: function (event, element, view) {
            element.find('.fc-title').html(
                'จังหวัด: ' + event.location
            );
        },
        dayClick: function (date, jsEvent, view) {
            let selectedDate = moment(date).format('DD/MM/YYYY');
            sessionStorage.setItem('selectedDate', selectedDate);
            listwork();
            showDatePopup(selectedDate, 'all');
        }
    });

    listitem()
    carlists()
    setInterval(function () {  //ให้มัน refresh auto
        carlists();
    }, 100000);
});

function listitem() {
    let ket = "listitems";
    let val = "data1";
    let keyset = "e"
    let extraValue = "";
    return getdatatable(ket, val, keyset, (updatedData) => {
        autocomplete("#cartype", updatedData);
    }, false, extraValue)
        .then(value => {
            autocomplete("#cartype", value);
        })
        .catch(error => {
            console.error("Error:", error);
        });
}

function carlists() {
    let ket = "carlists";
    let val = "data2";
    let keyset = "e"
    let extraValue = "";
    return getdatatable(ket, val, keyset, (updatedData) => {
        carlist = updatedData;
        listwork()
        initCalendar()
        initSpecialCalendar()
    }, false, extraValue)
        .then(value => {
            carlist = value;
            listwork()
            initCalendar()
            initSpecialCalendar()
        })
        .catch(error => {
            console.error("Error:", error);
        });
}

$('.savecar').click(async function (e) {
    e.preventDefault();
    let idform = "form";
    let itemData = await getFormData(idform);

    if (!checkvalue(itemData, [])) {
    } else {
        savecar(itemData);
    }
});

$('.backhome').click(function (e) {
    e.preventDefault();
    showhidepage('.home')
    clearForm('form')
});

$('.addcar').click(function (e) {
    e.preventDefault();
    showhidepage('.form')
});

function savecar(itemData) {
    showhidepage('header');
    let setstatus = {
        opt: 'savecar',
        ...itemData
    };
    fetch(scriptUrl, {
        method: "POST",
        body: new URLSearchParams(setstatus),
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        }
    })
        .then(async response => {
            let text = await response.text();
            try {
                return JSON.parse(text);
            } catch (e) {
                console.error('Server returned non-JSON:', text.substring(0, 500));
                throw new Error('เซิร์ฟเวอร์ตอบกลับไม่ถูกต้อง (ดู Console สำหรับรายละเอียด)');
            }
        })
        .then(res => {
            if (res.status === 'success') {
                carlists()
                Swal.fire({
                    title: res.message,
                    icon: 'success',
                    timer: 2000,
                    showConfirmButton: false
                }).then(() => {
                    showhidepage('.home');
                    clearForm('form')
                });
            } else if (res.status === "error") {
                Swal.fire({
                    icon: 'error',
                    title: res.message,
                    allowOutsideClick: false,
                    confirmButtonText: 'ตกลง',
                }).then(() => {
                    showhidepage('.form');
                });
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'ตอบกลับจากเซิร์ฟเวอร์ไม่รู้จัก',
                    text: JSON.stringify(res),
                    allowOutsideClick: false,
                    confirmButtonText: 'ตกลง',
                });
            }
        })
        .catch(err => {
            showhidepage('.form');
            console.error(err);
            Swal.fire({
                icon: 'error',
                title: 'เกิดข้อผิดพลาด',
                text: err.message || 'ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้',
                allowOutsideClick: false,
                confirmButtonText: 'ตกลง',
            });
        });
}

function listwork() {
    let $table = $('.shiftTable tbody');
    $table.empty();
    const selectedDate = sessionStorage.getItem('selectedDate');
    const selectedMonth = sessionStorage.getItem('selectedMonth');
    
    let dataToShow = carlist;
    
    if (selectedDate) {
        dataToShow = dataToShow.filter(row => getDate(row[0]) === selectedDate);
    } else if (selectedMonth) {
        dataToShow = dataToShow.filter(row => {
            let rowMonth = getDate(row[0]).split('/')[1];
            return rowMonth === selectedMonth;
        });
    }

    dataToShow.forEach(function (row) {
        let tr = $('<tr></tr>');
        tr.append('<td>' + getDate(row[0]) + '</td>');
        tr.append('<td>' + row[1] + '</td>');
        tr.append('<td>' + row[2] + '</td>');
        tr.append('<td>' + row[3] + '</td>');
        tr.append('<td>' + row[4] + '</td>');
        $table.append(tr);
    });
}

function getDate(dateStr) {
    const dateObj = new Date(dateStr);
    const year = dateObj.getFullYear()
    const month = ('0' + (dateObj.getMonth() + 1)).slice(-2);
    const day = ('0' + dateObj.getDate()).slice(-2);
    return `${day}/${month}/${year}`;
}

function initCalendar() {
    $('#calendar').fullCalendar('destroy');

    let carEvents = carlist.map(function (row) {
        let localDate = moment.utc(row[0]).local().format();
        return {
            start: localDate,
            name: row[1],
            carType: row[2],
            amount: row[3],
            location: row[4],
            title: row[1]
        };
    });

    $('#calendar').fullCalendar({
        height: 'auto',
        header: {
            left: 'prev,next today',
            center: 'title',
            right: 'month,agendaWeek,agendaDay'
        },
        navLinks: true,
        editable: true,
        eventLimit: true,
        displayEventTime: false,
        events: carEvents,
        eventRender: function (event, element, view) {
            element.find('.fc-title').html(
                'จังหวัด: ' + event.location
            );
        },
        dayClick: function (date, jsEvent, view) {
            let selectedDate = moment(date).format('DD/MM/YYYY');
            sessionStorage.setItem('selectedDate', selectedDate);
            listwork();
            showDatePopup(selectedDate, 'all');
        }
    });
}

function populateProvinceDropdown() {
    let $input = $('#location');
    if (!$input.length) return;
    $input.val('');
    autocomplete('#location', PROVINCES);
}

function initSpecialCalendar() {
    $('#specialCalendar').fullCalendar('destroy');

    let carEvents = carlist.filter(function(row) {
        return SPECIAL_PROVINCES.indexOf(row[4]) !== -1;
    }).map(function (row) {
        let localDate = moment.utc(row[0]).local().format();
        return {
            start: localDate,
            name: row[1],
            carType: row[2],
            amount: row[3],
            location: row[4],
            title: row[1]
        };
    });

    $('#specialCalendar').fullCalendar({
        height: 'auto',
        header: {
            left: 'prev,next today',
            center: 'title',
            right: 'month,agendaWeek,agendaDay'
        },
        navLinks: true,
        editable: true,
        eventLimit: true,
        displayEventTime: false,
        events: carEvents,
        eventRender: function (event, element, view) {
            element.find('.fc-title').html(
                'จังหวัด: ' + event.location
            );
        },
        dayClick: function (date, jsEvent, view) {
            let selectedDate = moment(date).format('DD/MM/YYYY');
            sessionStorage.setItem('selectedDate', selectedDate);
            listwork();
            showDatePopup(selectedDate, 'special');
        }
    });
}

function showDatePopup(date, source) {
    let bookings = carlist.filter(function(row) {
        if (getDate(row[0]) !== date) return false;
        if (source === 'special') {
            return SPECIAL_PROVINCES.indexOf(row[4]) !== -1;
        }
        return true;
    });
    
    let title = 'รายการจองวันที่ ' + date;
    let html = '';
    
    if (!bookings.length) {
        html = '<p class="text-center text-muted">ไม่มีรายการจองในวันนี้</p>';
    } else {
        html = '<table class="table table-sm table-bordered text-start">' +
            '<thead><tr><th>ลูกค้า</th><th>ประเภท</th><th>จำนวน</th><th>จังหวัด</th></tr></thead><tbody>';
        bookings.forEach(function(row) {
            html += '<tr>' +
                '<td>' + escapeHtml(row[1]) + '</td>' +
                '<td>' + escapeHtml(row[2]) + '</td>' +
                '<td>' + escapeHtml(row[3]) + '</td>' +
                '<td>' + escapeHtml(row[4]) + '</td>' +
                '</tr>';
        });
        html += '</tbody></table>';
    }
    
    Swal.fire({
        title: title,
        html: html,
        width: '600px',
        confirmButtonText: 'ปิด'
    });
}

function formatDateISO(d) {
    let y = d.getFullYear();
    let m = String(d.getMonth() + 1).padStart(2, '0');
    let day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
}

function escapeHtml(text) {
    if (text == null) return '';
    let div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

$(document).ready(function() {
    populateProvinceDropdown();
    initSpecialCalendar();
    
    $('#monthFilter').on('change', function() {
        sessionStorage.removeItem('selectedDate');
        sessionStorage.setItem('selectedMonth', $(this).val());
        listwork();
    });
});
