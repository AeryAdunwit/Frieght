<script>
  var SPECIAL_PROVINCES = new Set(['กรุงเทพมหานคร', 'นนทบุรี', 'สมุทรปราการ', 'ปทุมธานี']);

  var PROVINCES = [
    'กระบี่','กรุงเทพมหานคร','กาญจนบุรี','กาฬสินธุ์','กำแพงเพชร',
    'ขอนแก่น','จันทบุรี','ฉะเชิงเทรา','ชลบุรี','ชัยนาท',
    'ชัยภูมิ','ชุมพร','เชียงราย','เชียงใหม่','ตรัง',
    'ตราด','ตาก','นครนายก','นครปฐม','นครพนม',
    'นครราชสีมา','นครศรีธรรมราช','นครสวรรค์','นนทบุรี','นราธิวาส',
    'น่าน','บึงกาฬ','บุรีรัมย์','ปทุมธานี','ประจวบคีรีขันธ์',
    'ปราจีนบุรี','ปัตตานี','พระนครศรีอยุธยา','พะเยา','พังงา',
    'พัทลุง','พิจิตร','พิษณุโลก','เพชรบุรี','เพชรบูรณ์',
    'แพร่','ภูเก็ต','มหาสารคาม','มุกดาหาร','แม่ฮ่องสอน',
    'ยโสธร','ยะลา','ร้อยเอ็ด','ระนอง','ระยอง',
    'ราชบุรี','ลพบุรี','ลำปาง','ลำพูน','เลย',
    'ศรีสะเกษ','สกลนคร','สงขลา','สตูล','สมุทรปราการ',
    'สมุทรสงคราม','สมุทรสาคร','สระแก้ว','สระบุรี','สิงห์บุรี',
    'สุโขทัย','สุพรรณบุรี','สุราษฎร์ธานี','สุรินทร์','หนองคาย',
    'หนองบัวลำภู','อ่างทอง','อำนาจเจริญ','อุดรธานี','อุตรดิตถ์',
    'อุทัยธานี','อุบลราชธานี'
  ];

  // ─── State ───────────────────────────────────────
  var bookings = [];
  var cartypes = [];
  var calMain = null;
  var calSpecial = null;
  var selectedMonth = String(new Date().getMonth() + 1).padStart(2, '0');

  // ─── Helpers ─────────────────────────────────────
  function toDate(raw) {
    var d = raw instanceof Date ? raw : new Date(raw);
    return Number.isNaN(d.getTime()) ? null : d;
  }

  function formatDateTH(raw) {
    var d = toDate(raw);
    if (!d) return String(raw || '');
    return String(d.getDate()).padStart(2,'0') + '/' +
           String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
  }

  function toISO(raw) {
    var d = toDate(raw);
    if (!d) return null;
    return d.getFullYear() + '-' +
           String(d.getMonth()+1).padStart(2,'0') + '-' +
           String(d.getDate()).padStart(2,'0');
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
  }

  function isSpecial(province) { return SPECIAL_PROVINCES.has(province); }

  // ─── Loading ─────────────────────────────────────
  function setLoading(show) {
    document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
  }

  function setRefreshing(show) {
    document.getElementById('refreshIcon').classList.toggle('spinning', show);
  }

  // ─── Dropdowns ───────────────────────────────────
  function populateDropdowns() {
    var pList = document.getElementById('provinceList');
    pList.innerHTML = PROVINCES.map(function(p) { return '<option value="' + esc(p) + '">'; }).join('');
    var cList = document.getElementById('cartypeList');
    cList.innerHTML = cartypes.map(function(c) { return '<option value="' + esc(c) + '">'; }).join('');
  }

  // ─── Calendars ───────────────────────────────────
  function buildEvents(special) {
    return bookings
      .filter(function(row) { return special ? isSpecial(row[4]) : !isSpecial(row[4]); })
      .map(function(row) { return { title: row[1], start: toISO(row[0]), extendedProps: { location: row[4] } }; })
      .filter(function(e) { return e.start; });
  }

  function makeCalendar(elId, special) {
    return new FullCalendar.Calendar(document.getElementById(elId), {
      initialView: 'dayGridMonth',
      locale: 'th',
      headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
      height: 'auto',
      events: buildEvents(special),
      eventColor: special ? '#f97316' : '#3b82f6',
      eventContent: function(arg) {
        return {
          html: '<div class="px-1 py-0.5 truncate leading-tight" title="' + esc(arg.event.extendedProps.location) + '">' +
                esc(arg.event.title) + ' <span style="opacity:.6">· ' + esc(arg.event.extendedProps.location) + '</span></div>'
        };
      },
      dateClick: function(info) { showDatePopup(info.dateStr, special); }
    });
  }

  function initCalendars() {
    if (calMain) { calMain.destroy(); calMain = null; }
    if (calSpecial) { calSpecial.destroy(); calSpecial = null; }
    calMain = makeCalendar('calendarMain', false);
    calSpecial = makeCalendar('calendarSpecial', true);
    calMain.render();
    calSpecial.render();
  }

  // ─── Date Popup ──────────────────────────────────
  function showDatePopup(dateStr, special) {
    var parts = dateStr.split('-');
    var y = parts[0], m = parts[1], d = parts[2];
    var matches = bookings.filter(function(row) {
      return toISO(row[0]) === dateStr && (special ? isSpecial(row[4]) : !isSpecial(row[4]));
    });

    var html;
    if (matches.length) {
      html = '<div class="overflow-x-auto"><table class="w-full text-sm text-left">' +
        '<thead><tr class="text-xs text-gray-500 border-b border-gray-100">' +
        '<th class="pb-2 pr-3 font-semibold">ชื่อ</th>' +
        '<th class="pb-2 pr-3 font-semibold">ประเภท</th>' +
        '<th class="pb-2 pr-3 font-semibold text-center">จำนวน</th>' +
        '<th class="pb-2 font-semibold">จังหวัด</th>' +
        '</tr></thead><tbody>' +
        matches.map(function(row) {
          var badgeCls = isSpecial(row[4]) ? 'badge badge-amber' : 'badge badge-indigo';
          return '<tr style="border-bottom:1px solid #f1f5f9">' +
            '<td style="padding:8px 12px 8px 0">' + esc(row[1]) + '</td>' +
            '<td style="padding:8px 12px 8px 0;color:#64748b;font-size:.8rem">' + esc(row[2]) + '</td>' +
            '<td style="padding:8px 12px 8px 0;text-align:center">' + esc(row[3]) + '</td>' +
            '<td style="padding:8px 0"><span class="' + badgeCls + '">' + esc(row[4]) + '</span></td></tr>';
        }).join('') +
        '</tbody></table></div>';
    } else {
      html = '<p style="color:#9ca3af;text-align:center;padding:16px 0">ไม่มีรายการในวันนี้</p>';
    }

    Swal.fire({
      title: 'วันที่ ' + d + '/' + m + '/' + y,
      html: html,
      width: 540,
      confirmButtonText: 'ปิด',
      confirmButtonColor: '#3b82f6'
    });
  }

  // ─── Table ───────────────────────────────────────
  function renderTable() {
    var tbody = document.getElementById('bookingTableBody');
    var footer = document.getElementById('tableFooter');
    var data = selectedMonth
      ? bookings.filter(function(row) {
          var d = toDate(row[0]);
          return d && String(d.getMonth()+1).padStart(2,'0') === selectedMonth;
        })
      : bookings;

    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="px-5 py-10 text-center text-gray-400">ไม่มีรายการ</td></tr>';
      footer.textContent = '';
      return;
    }

    tbody.innerHTML = data.map(function(row, i) {
      var badgeCls = isSpecial(row[4]) ? 'badge badge-amber' : 'badge badge-indigo';
      return '<tr>' +
        '<td class="muted" style="white-space:nowrap">' + formatDateTH(row[0]) + '</td>' +
        '<td>' + esc(row[1]) + '</td>' +
        '<td class="muted">' + esc(row[2]) + '</td>' +
        '<td class="center">' + esc(row[3]) + '</td>' +
        '<td><span class="' + badgeCls + '">' + esc(row[4]) + '</span></td></tr>';
    }).join('');
    footer.textContent = 'แสดง ' + data.length + ' รายการ';
  }

  // ─── Modal ───────────────────────────────────────
  function openModal() {
    document.getElementById('bookingForm').reset();
    document.getElementById('bookingModal').classList.add('open');
    document.getElementById('fDate').focus();
  }

  function closeModal() {
    document.getElementById('bookingModal').classList.remove('open');
  }

  // ─── Load data (google.script.run) ───────────────
  function loadData(showLoader) {
    if (showLoader !== false) setLoading(true);
    else setRefreshing(true);

    google.script.run
      .withSuccessHandler(function(res) {
        bookings = res.data2 || [];
        var raw = res.data1 || [];
        cartypes = Array.from(new Set(raw.map(function(r) { return r[0]; }).filter(Boolean)));
        populateDropdowns();
        initCalendars();
        renderTable();
        setLoading(false);
        setRefreshing(false);
      })
      .withFailureHandler(function(err) {
        Swal.fire({ icon: 'error', title: 'โหลดข้อมูลไม่สำเร็จ', text: err.message || String(err), confirmButtonColor: '#3b82f6' });
        setLoading(false);
        setRefreshing(false);
      })
      .getAllData();
  }

  // ─── Events ──────────────────────────────────────
  document.getElementById('btnAddBooking').addEventListener('click', openModal);
  document.getElementById('btnRefresh').addEventListener('click', function() { loadData(false); });
  document.getElementById('btnCloseModal').addEventListener('click', closeModal);
  document.getElementById('btnCancelForm').addEventListener('click', closeModal);

  document.getElementById('bookingModal').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) closeModal();
  });

  document.getElementById('monthFilter').addEventListener('change', function(e) {
    selectedMonth = e.target.value;
    renderTable();
  });

  document.getElementById('btnClearFilter').addEventListener('click', function() {
    selectedMonth = '';
    document.getElementById('monthFilter').value = '';
    renderTable();
  });

  document.getElementById('bookingForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var payload = {
      date: document.getElementById('fDate').value,
      name: document.getElementById('fName').value.trim(),
      cartype: document.getElementById('fCartype').value.trim(),
      amount: document.getElementById('fAmount').value,
      location: document.getElementById('fLocation').value.trim()
    };

    if (!Object.values(payload).every(Boolean)) {
      Swal.fire({ icon: 'warning', title: 'กรุณากรอกข้อมูลให้ครบ', confirmButtonColor: '#3b82f6' });
      return;
    }
    if (!PROVINCES.includes(payload.location)) {
      Swal.fire({ icon: 'error', title: 'จังหวัดไม่ถูกต้อง', text: 'กรุณาเลือกจังหวัดจากรายการ', confirmButtonColor: '#3b82f6' });
      return;
    }

    var btn = document.getElementById('btnSubmitForm');
    btn.disabled = true;
    btn.textContent = 'กำลังบันทึก...';

    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false;
        btn.textContent = 'บันทึก';
        if (res.status === 'success') {
          closeModal();
          Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', timer: 1600, showConfirmButton: false });
          loadData(false);
        } else {
          Swal.fire({ icon: 'error', title: 'บันทึกไม่สำเร็จ', text: res.message, confirmButtonColor: '#3b82f6' });
        }
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        btn.textContent = 'บันทึก';
        Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: err.message || String(err), confirmButtonColor: '#3b82f6' });
      })
      .saveBookingClient(payload);
  });

  // ─── Init ────────────────────────────────────────
  document.getElementById('monthFilter').value = selectedMonth;
  loadData(true);
  setInterval(function() { loadData(false); }, 120000);
</script>
