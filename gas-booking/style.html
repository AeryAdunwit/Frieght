<style>
  .progress {
    height: 4.5px;
    width: 145.6px;
    background: linear-gradient(#000000 0 0),
      linear-gradient(#000000 0 0),
      #dbdcef;
    background-size: 60% 100%;
    background-repeat: no-repeat;
    animation: progress-7x9cg2 3s infinite;
  }

  @keyframes progress-7x9cg2 {
    0% {
      background-position: -150% 0, -150% 0;
    }

    66% {
      background-position: 250% 0, -150% 0;
    }

    100% {
      background-position: 250% 0, 250% 0;
    }
  }

  .autocomplete-suggestions {
    position: absolute;
    z-index: 1000;
    width: 100%;
    display: none;
  }

  #calendar {
    min-height: 530px;
    /* ปรับตามความต้องการ */
  }

/* ============================================
   BookingSolar — Calendar & Table Styles
   ============================================ */

.booking-calendar-wrap {
  margin-top: 16px;
  padding: 16px;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  background: #fafafa;
}

.booking-calendar-wrap.hidden {
  display: none;
}

.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.calendar-header h4 {
  margin: 0;
  font-size: 16px;
  color: #333;
}

.calendar-nav {
  display: flex;
  gap: 8px;
}

.calendar-nav button {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 4px 12px;
  cursor: pointer;
  font-size: 14px;
}

.calendar-nav button:hover {
  background: #f0f0f0;
}

.calendar-table {

  padding: 8px 4px;
  text-align: center;
  font-weight: 600;
  border-bottom: 1px solid #ddd;
}

.calendar-table td {
  padding: 8px 4px;
  text-align: center;
  vertical-align: middle;
  height: 48px;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.15s;
}

.calendar-table td:hover:not(.empty):not(.full) {
  background: #e3f2fd;
}

.calendar-table td.empty {
  color: #ccc;
  cursor: default;
}

.calendar-table td.selected {
  background: #1976d2;
  color: #fff;
  font-weight: 600;
}

.calendar-table td.full {
  background: #ffcdd2;
  color: #c62828;
  cursor: not-allowed;
  text-decoration: line-through;
}

.calendar-table td.partial {
  background: #fff9c4;
  color: #f57f17;
}

.calendar-table td.available {
  background: #c8e6c9;
  color: #2e7d32;
}

.calendar-table td .date-num {
  display: block;
  font-size: 14px;

}

}

.legend-item {

  align-items: center;
  gap: 4px;
}

.legend-dot {

  height: 12px;
  border-radius: 3px;
}

  border-radius: 12px;

}

  color: #555;
}

.booking-table tr:hover td {

.booking-table-empty {
