<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Porlor Tracking Helper</title>
  <style>
    :root {
      --primary: #eb2337;
      --text: #1f2937;
      --muted: #6b7280;
      --card: #ffffff;
      --bg: #f5f7fb;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #fff5f6 0%, var(--bg) 100%);
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .hero {
      padding: 20px 22px;
      background: linear-gradient(135deg, rgba(235, 35, 55, 0.12), rgba(255, 255, 255, 0.95));
      border-bottom: 1px solid var(--border);
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 22px;
      color: var(--primary);
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .body {
      padding: 22px;
      display: grid;
      gap: 16px;
    }

    .track-box {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      padding: 14px 16px;
      border: 1px dashed #f19aa4;
      border-radius: 14px;
      background: #fff8f8;
    }

    .label {
      font-size: 13px;
      color: var(--muted);
    }

    .track-value {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--primary);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    .tips {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    iframe {
      width: 100%;
      height: 620px;
      border: 0;
      background: #fff;
      border-radius: 0 0 18px 18px;
    }

    @media (max-width: 640px) {
      .track-value { font-size: 20px; }
      iframe { height: 520px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <h1>เช็คสถานะ Porlor งับ</h1>
        <p>น้องโกดังเตรียมเลข DO ไว้ให้แล้วงับ ถ้าหน้าเว็บ Porlor ยังไม่ใส่เลขให้อัตโนมัติ ก็กดคัดลอกแล้ววางต่อได้ทันทีเลย</p>
      </div>
      <div class="body">
        <div class="track-box">
          <div>
            <div class="label">เลข DO ที่กำลังเช็ค</div>
            <div class="track-value" id="track-value">-</div>
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="copy-btn" type="button">คัดลอกเลข DO</button>
          <a class="btn btn-secondary" id="open-btn" href="https://rfe.co.th/hc_rfeweb/trackingweb" target="_blank" rel="noopener noreferrer">เปิด Porlor แบบเต็มหน้า</a>
        </div>
        <div class="tips">
          ถ้าหน้า Porlor ไม่รับการกรอกเลขให้อัตโนมัติจากภายนอก ให้คัดลอกเลขด้านบนแล้ววางในช่อง Tracking Number ได้เลยงับ
        </div>
      </div>
      <iframe
        id="porlor-frame"
        src="https://rfe.co.th/hc_rfeweb/trackingweb"
        title="Porlor Tracking"
        loading="eager"
        referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const trackNo = (params.get('track') || '').trim();
    const trackValue = document.getElementById('track-value');
    const copyBtn = document.getElementById('copy-btn');
    const openBtn = document.getElementById('open-btn');

    if (trackNo) {
      trackValue.textContent = trackNo;
      openBtn.href = `https://rfe.co.th/hc_rfeweb/trackingweb`;
    }

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(trackNo);
        copyBtn.textContent = 'คัดลอกแล้วงับ';
      } catch (error) {
        copyBtn.textContent = 'คัดลอกไม่สำเร็จ';
      }
    });
  </script>
</body>
</html>
