name: Test Suite

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Run backend unit and smoke tests
        run: python -m unittest discover -s backend/tests -v

  frontend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check frontend chat script syntax
        run: node --check Frieght/js/chat.js
